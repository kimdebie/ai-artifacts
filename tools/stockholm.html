<!DOCTYPE html>
<html class="staticrypt-html">

        <meta charset="utf-8" />
        <title>Welkom in Stockholm</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta http-equiv="cache-control" content="no-cache" />

        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <style>
            :root {
                --bg: #faf8f5;
                --text: #2a2a2a;
                --text-muted: #6b6b6b;
                --accent: #e07856;
                --accent-hover: #c9684a;
                --accent-light: #fff0eb;
                --card-bg: #ffffff;
                --card-border: #e8e4de;
                --ocean: #2d4a7a;
                --frost: #e8f0fe;
                --amber: #e8913a;
            }

            .staticrypt-html {
                height: 100%;
            }

            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-content {
                height: 100%;
                margin-bottom: 0;
                background: var(--bg);
                font-family: 'DM Sans', -apple-system, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
            }

            .staticrypt-hr {
                margin-top: 20px;
                margin-bottom: 20px;
                border: 0;
                border-top: 1px solid var(--card-border);
            }

            .staticrypt-page {
                width: 100%;
                max-width: 420px;
                padding: 24px;
                margin: auto;
                box-sizing: border-box;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: var(--card-bg);
                max-width: 420px;
                margin: 0 auto;
                padding: 48px 40px 40px;
                text-align: center;
                border-radius: 16px;
                border: 1px solid var(--card-border);
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
                animation: cardFloat 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
            }

            @keyframes cardFloat {
                from {
                    opacity: 0;
                    transform: translateY(24px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .staticrypt-badge {
                font-size: 2.5rem;
                margin-bottom: 8px;
                line-height: 1;
            }

            .staticrypt-instructions {
                margin-top: 0;
                margin-bottom: 1em;
            }

            .staticrypt-title {
                font-family: 'Fraunces', Georgia, serif;
                font-size: 1.65em;
                font-weight: 600;
                color: var(--text);
                letter-spacing: -0.02em;
                line-height: 1.2;
                margin-bottom: 8px;
            }

            .staticrypt-instructions p:last-child {
                color: var(--text-muted);
                font-size: 0.95rem;
                line-height: 1.5;
            }

            .staticrypt-form input[type="password"],
            input[type="text"] {
                background: var(--bg);
                border: 0;
                box-sizing: border-box;
                font-family: 'DM Sans', sans-serif;
                font-size: 15px;
                outline: 0;
                padding: 15px 42px 15px 16px;
                width: 100%;
                color: var(--text);
            }

            .staticrypt-form input[type="password"]::placeholder,
            input[type="text"]::placeholder {
                color: var(--text-muted);
                opacity: 0.6;
            }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: var(--bg);
                width: 100%;
                border: 1px solid var(--card-border);
                border-radius: 12px;
                margin: 0 0 16px;
                box-sizing: border-box;
                overflow: hidden;
                transition: border-color 0.2s ease;
            }

            .staticrypt-password-container:focus-within {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px var(--accent-light);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                opacity: 0.4;
                padding: 14px;
                position: absolute;
                right: 2px;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                transition: opacity 0.2s ease;
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.7;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: uppercase;
                outline: 0;
                background: var(--accent);
                width: 100%;
                border: 0;
                padding: 14px 24px;
                color: #ffffff;
                font-family: 'DM Sans', sans-serif;
                font-size: 0.85rem;
                font-weight: 500;
                letter-spacing: 0.08em;
                cursor: pointer;
                border-radius: 12px;
                transition: all 0.25s ease;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: var(--accent-hover);
                transform: translateY(-1px);
                box-shadow: 0 4px 16px rgba(224, 120, 86, 0.3);
                filter: none;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 16px;
                font-size: 0.9rem;
                color: var(--text-muted);
                cursor: pointer;
                justify-content: center;
                gap: 8px;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.2);
                margin: 0;
                accent-color: var(--accent);
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg);
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                vertical-align: text-bottom;
                border: 0.25em solid var(--card-border);
                border-right-color: var(--accent);
                border-radius: 50%;
                -webkit-animation: spinner-border 0.75s linear infinite;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            .staticrypt-footer {
                text-align: center;
                margin-top: 24px;
                font-size: 0.8rem;
                color: var(--text-muted);
                opacity: 0.5;
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                input[type="text"] {
                    font-size: 16px;
                }
            }

            @media (max-width: 480px) {
                .staticrypt-page {
                    padding: 16px;
                }

                .staticrypt-form {
                    padding: 36px 28px 32px;
                }
            }
        </style>
    </head>

                    toggleIcon.alt = templateToggleAltShow;
                    toggleIcon.title = templateToggleAltShow;
                }
            });

            // handle password form submission
            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();

                const password = document.getElementById("staticrypt-password").value,
                    isRememberChecked = document.getElementById("staticrypt-remember").checked;

                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

                if (!isSuccessful) {
